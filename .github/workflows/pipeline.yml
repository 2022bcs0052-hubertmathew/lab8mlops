name: ML Pipeline

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest


steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.9'

  - name: Install dependencies
    run: |
      pip install -r requirements.txt
      pip install dvc[s3]

  - name: Configure AWS credentials
    run: |
      echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
      echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
      echo "AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}" >> $GITHUB_ENV
      echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

  - name: Pull dataset from DVC
    run: dvc pull

  - name: Train model
    run: python src/train.py

  - name: Upload metrics
    uses: actions/upload-artifact@v3
    with:
      name: metrics
      path: metrics.json

  - name: Build Docker image
    run: docker build -t housing-model .

  - name: Login to DockerHub
    run: echo ${{ secrets.DOCKER_PASS }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

  - name: Push Docker image
    run: |
      docker tag housing-model ${{ secrets.DOCKER_USER }}/housing-model:latest
      docker push ${{ secrets.DOCKER_USER }}/housing-model:latest
